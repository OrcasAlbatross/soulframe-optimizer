<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulframe Equipment Optimizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Soulframe Optimizer</h1>
        <p id="status-msg" style="color: #ccc;">Initializing...</p>
    </header>

    <main>
        <section class="stat-box">
            <h3>Enter Envoy Stats</h3>
            <div class="input-group">
                <label for="courage">Courage:</label>
                <input type="number" id="courage" value="20">
            </div>
            <div class="input-group">
                <label for="spirit">Spirit:</label>
                <input type="number" id="spirit" value="10">
            </div>
            <div class="input-group">
                <label for="grace">Grace:</label>
                <input type="number" id="grace" value="10">
            </div>
            <button id="optimize-btn">Test Load Data</button>
        </section>

        <section id="results-container" class="grid-container">
            <div>
                <h3>Armor Test</h3>
                <div id="armor-results"></div>
            </div>
            <div>
                <h3>Weapon Test</h3>
                <div id="weapon-results"></div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="parser.js"></script>
    <script src="calculator.js"></script>
    <script src="app.js"></script>
</body>
</html>
